<script>
    // System Configurations
    let schoolNotices = [
        { title: "🎒 School ERP Live Notice", content: "Welcome to our new GitHub Campus Management System node portal." }
    ];

    // PASTE YOUR GOOGLE SHEET WEB APP URL HERE:
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzaGj2xObS5sPXVxsHGmusRQgTkecJ-fW1XBXDOZ2hQybV30W95x21L6ihVPCp25sYU/execd";

    async function forceLogin() {
        const role = document.getElementById('loginRole').value;
        const username = document.getElementById('loginId').value.trim();
        const blueButton = document.querySelector('.btn-primary');

        // Show a loading status text to the user
        blueButton.innerText = "Connecting to Google Sheet...";
        blueButton.disabled = true;

        try {
            // Sends the login or registration packet live to your spreadsheet row
            const response = await fetch(GOOGLE_SHEET_API_URL, {
                method: "POST",
                mode: "cors",
                body: JSON.stringify({
                    role: role,
                    username: username || "Anonymous User"
                })
            });

            const result = await response.json();
            console.log("Database Response:", result);

            // Successfully logged into the system dashboard
            document.getElementById('loginPanel').classList.remove('active');
            
            if (role === 'teacher') {
                document.getElementById('teacherPortal').classList.add('active');
                renderAttendanceRows(); 
            } else {
                document.getElementById('studentPortal').classList.add('active');
                renderStudentProfile();
            }

        } catch (error) {
            console.error("Google Sheets Connection Error:", error);
            alert("Database Error: Could not verify data rows. Your code is correct, please verify your Apps Script Deployment permissions!");
            
            // Backup offline entry so the user is never locked out of the workspace screen
            document.getElementById('loginPanel').classList.remove('active');
            document.getElementById('teacherPortal').classList.add('active');
            renderAttendanceRows();
        } finally {
            blueButton.innerText = "Enter Workspace";
            blueButton.disabled = false;
        }
    }

    function handleLogout() {
        document.getElementById('teacherPortal').classList.remove('active');
        document.getElementById('studentPortal').classList.remove('active');
        document.getElementById('loginPanel').classList.add('active');
    }

    function switchTeacherTab(tabName, event) {
        document.querySelectorAll('.teacher-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        
        if (tabName === 'attendance') document.getElementById('tabAttendance').style.display = 'block';
        if (tabName === 'notices') document.getElementById('tabNotices').style.display = 'block';
        
        if(event && event.target) event.target.classList.add('active-tab');
    }

    function renderAttendanceRows() {
        const body = document.getElementById('attendanceTableBody');
        if(!body) return;
        body.innerHTML = `
            <tr><td><strong>STU1001</strong></td><td>Rahul Sharma</td><td>Class 10 A</td><td><span style="color:red; font-weight:bold;">Not Marked</span></td><td><button class="btn-success" style="padding:4px 8px; font-size:12px; width:auto;">Present</button></td></tr>
            <tr><td><strong>STU1002</strong></td><td>Priya Patel</td><td>Class 10 A</td><td><span style="color:red; font-weight:bold;">Not Marked</span></td><td><button class="btn-success" style="padding:4px 8px; font-size:12px; width:auto;">Present</button></td></tr>
        `;
    }

    function createNewNotice() {
        const title = document.getElementById('noticeTitle').value.trim();
        const content = document.getElementById('noticeContent').value.trim();
        if (title === "" || content === "") { alert("Please complete notice fields!"); return; }
        
        schoolNotices.unshift({ title: "📢 " + title, content: content });
        document.getElementById('noticeTitle').value = "";
        document.getElementById('noticeContent').value = "";
        alert("Notice published successfully!");
    }

    function renderStudentProfile() {
        const p = document.getElementById('studentNoticePanel');
        if(!p) return;
        p.innerHTML = "";
        schoolNotices.forEach(n => {
            p.innerHTML += `<div class="notice-box"><strong>${n.title}</strong><p style="margin:5px 0 0 0; font-size:14px; color:#475569;">${n.content}</p></div>`;
        });
    }
</script>
