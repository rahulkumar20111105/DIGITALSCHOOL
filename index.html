<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Coaching Hub Ultimate</title>
    <style>
        /* Modern Premium Midnight Theme Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; padding-bottom: 90px; }
        header { background: #111827; padding: 16px; text-align: center; border-bottom: 2px solid #1f2937; }
        header h1 { color: #6366f1; font-size: 20px; font-weight: 700; }
        
        .app-container { max-width: 500px; padding: 0 12px; margin: 0 auto; }
        
        /* App Layout Screens */
        .app-screen { display: none; background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .app-screen.active { display: block; }
        
        h2 { font-size: 14px; margin-bottom: 12px; color: #ffffff; border-left: 4px solid #6366f1; padding-left: 6px; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 10px; color: #9ca3af; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
        input, select { width: 100%; background: #1f2937; border: 1px solid #374151; color: #ffffff; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #6366f1; }
        
        .btn-primary { width: 100%; background: #6366f1; color: #ffffff; padding: 11px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: background 0.2s; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-action { background: #1f2937; color: #ffffff; border: 1px solid #374151; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .item-card { background: #1f2937; border: 1px solid #374151; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; }
        
        /* Attendance Button Toggles */
        .attendance-actions { display: flex; gap: 6px; margin-top: 8px; }
        .btn-p, .btn-a { padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; border: none; color: white; width: 50%; }
        .btn-p { background: #374151; }
        .btn-a { background: #374151; }
        .btn-p.active { background: #10b981; }
        .btn-a.active { background: #ef4444; }

        /* Printable PDF Frame Document Factory */
        .doc-preview-area { background: #fff; color: #000; padding: 20px; border-radius: 8px; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .id-card { border: 2px solid #6366f1; padding: 15px; border-radius: 8px; text-align: center; max-width: 230px; margin: 0 auto; background: #fff; color: #000; }
        .id-card-header { background: #6366f1; color: #fff; padding: 5px; font-weight: bold; font-size: 12px; border-radius: 4px; margin-bottom: 10px; text-transform: uppercase; }
        .receipt-box { border: 2px dashed #10b981; padding: 15px; background: #ffffff; color: #000000; font-size: 13px; border-radius: 6px; }
        .receipt-header { border-bottom: 2px dashed #10b981; text-align: center; padding-bottom: 6px; margin-bottom: 10px; font-weight: bold; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 4px; }

        /* 24x7 AI Doubt Box Timelines */
        .chat-box { background: #111827; border: 1px solid #374151; border-radius: 10px; height: 180px; overflow-y: auto; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 12px; line-height: 1.4; }
        .msg.user { background: #6366f1; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg.ai { background: #1f2937; color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #374151; }

        /* FIXED FLOATING APP BOTTOM NAVIGATION BAR */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; border-top: 1px solid #1f2937; padding: 12px 0; z-index: 9999; }
        .nav-wrapper { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-around; }
        .nav-btn { background: none; border: none; color: #9ca3af; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 20%; font-weight: 500; }
        .nav-btn.active { color: #6366f1; font-weight: bold; }
        .nav-btn span { font-size: 16px; }

        @media print {
            body { background: white; color: black; padding: 0; }
            nav, header, h2, .item-card, .btn-primary { display: none !important; }
            .doc-preview-area { display: block !important; border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Smart Coaching Hub Pro</h1>
    </header>

    <main class="app-container">
        <!-- 1. ADMISSION TAB SCREEN -->
        <section id="screen-students" class="app-screen active">
            <h2>👤 Student Admission Form</h2>
            <div class="item-card">
                <div class="form-group"><label>Student Full Name</label><input id="form-name" type="text" placeholder="e.g. Rahul Kumar"></div>
                <div class="form-group"><label>Parent Phone Number</label><input id="form-phone" type="tel" placeholder="e.g. 9708183956"></div>
                <button onclick="admitStudent()" class="btn-primary">Enroll & Generate ID</button>
            </div>
            <h2>👥 Registered Base</h2>
            <div id="master-student-list"></div>
        </section>

        <!-- 2. FINANCE TAB SCREEN -->
        <section id="screen-finance" class="app-screen">
            <h2>💰 Fee Ledger and Accounts</h2>
            <div class="item-card">
                <div class="form-group"><label>Select Student Target</label><select id="fee-student-select"></select></div>
                <div class="form-group"><label>Amount Received (₹)</label><input id="fee-amount-input" type="number" placeholder="e.g. 2000"></div>
                <button onclick="processFeePayment()" class="btn-primary" style="background:#10b981;">Create Invoice Receipt</button>
            </div>
            <h2>📋 Active Fee Statement Accounts</h2>
            <div id="ledger-list-container"></div>
        </section>

        <!-- 3. AI DOUBT SUPPORT SCREEN -->
        <section id="screen-ai" class="app-screen">
            <h2>🤖 24x7 AI Doubt Support</h2>
            <div class="chat-box" id="ai-box-viewport">
                <div class="msg ai">Hello! Type any academic doubt, and I will resolve it instantly!</div>
            </div>
            <div style="display:flex; gap:6px;">
                <input type="text" id="ai-input-box" placeholder="Ask any physics, chemistry or maths question...">
                <button onclick="askAIEngine()" class="btn-primary" style="margin:0; width:80px;">Ask</button>
            </div>
        </section>

        <!-- 4. DOCUMENT FACTORY TEMPLATE PRINTER -->
        <section id="screen-docs" class="app-screen">
            <h2>🗂️ Document Factory templates</h2>
            <div class="item-card">
                <div class="form-group"><label>Select Target Student</label><select id="doc-student-select"></select></div>
                <button onclick="printStudentIDCard()" class="btn-primary">Generate Printable ID Card</button>
            </div>
        </section>

        <!-- CENTRAL PRINT Engine FRAME VIEWPORT -->
        <div id="document-print-viewport" class="doc-preview-area"></div>
        <button id="btn-print-trigger" onclick="window.print()" class="btn-primary" style="background:#000; display:none; margin-bottom:20px; border:1px solid #374151;">🖨 Download PDF Document</button>

        <!-- 5. ATTENDANCE MONITORING PANEL -->
        <section id="screen-attendance" class="app-screen">
            <h2>Attendance Monitoring Sheets</h2>
            <div id="attendance-list-container"></div>
        </section>
    </main>

    <!-- FIXED IMMERSIVE BOTTOM TAB BAR NAVIGATION MENU -->
    <nav>
        <div class="nav-wrapper">
            <button onclick="switchTab('students')" id="nav-students" class="nav-btn active"><span>👥</span>Admission</button>
            <button onclick="switchTab('finance')" id="nav-finance" class="nav-btn"><span>💰</span>Finance</button>
            <button onclick="switchTab('ai')" id="nav-ai" class="nav-btn"><span>🤖</span>AI Doubt</button>
            <button onclick="switchTab('docs')" id="nav-docs" class="nav-btn"><span>🗂️</span>Doc Factory</button>
            <button onclick="switchTab('attendance')" id="nav-attendance" class="nav-btn"><span>📋</span>Attendance</button>
        </div>
    </nav>

    <script>
        // App Central Data Store Memory State
        let students = [
            { id: "COACH-001", name: "Rahul Maurya", phone: "919708183956", attendance: "Not Marked", totalFees: 10000, paidFees: 7000 },
            { id: "COACH-002", name: "Amit Singh", phone: "918888888888", attendance: "Not Marked", totalFees: 10000, paidFees: 4000 }
        ];

        // 1. Navigation Tab Switches
        function switchTab(tabId) {
            let screens = document.querySelectorAll('.app-screen');
            for(let i=0; i<screens.length; i++) { screens[i].classList.remove('active'); }
            
            let targetScreen = document.getElementById('screen-' + tabId);
            if(targetScreen) targetScreen.classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
