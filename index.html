<script>
    // Core Databases simulated completely in local frontend memory
    let teachersDatabase = [];
    let studentsDatabase = [];
    let schoolNotices = [
        { title: "🎒 School ERP Live Notice", content: "Welcome to our new GitHub Campus Management System node portal." }
    ];
    let loggedInUser = null;

    // Automatically generate 100 Teachers and 5,000 Students safely
    function initializeMassData() {
        // 1. Generate 100 Teachers (IDs: TCH01 to TCH100)
        for (let i = 1; i <= 100; i++) {
            let numStr = i < 10 ? '0' + i : i;
            teachersDatabase.push({
                id: "TCH" + numStr,
                name: "Teacher Professor " + i,
                password: "teachpass" + numStr
            });
        }

        // 2. Generate 5,000 Students (IDs: STU1001 to STU6000)
        for (let s = 1001; s <= 6000; s++) {
            studentsDatabase.push({
                id: "STU" + s,
                name: "Student Name " + (s - 1000),
                password: "studpass" + s,
                classBatch: "Class " + (1 + (s % 12)),
                status: "Not Marked"
            });
        }
    }
    initializeMassData();

    // Sign-In Authentication Control Logic
    function handleLogin() {
        const role = document.getElementById('loginRole').value;
        let idInput = document.getElementById('loginId').value.trim().toUpperCase();
        const passwordInput = document.getElementById('loginPassword').value;

        if (role === 'teacher') {
            // AUTO-FIX: Convert input like "TCH01" to match database record format "TCH01" seamlessly
            if (idInput.startsWith("TCH") && idInput.length === 5 && idInput.charAt(3) !== '0') {
                idInput = "TCH0" + idInput.substring(3);
            }

            let teacher = teachersDatabase.find(t => t.id === idInput);
            if (teacher && teacher.password === passwordInput) {
                loggedInUser = teacher;
                showActivePanel('teacherPortal');
                document.getElementById('teacherWelcomeTitle').innerText = `👩‍🏫 Welcome, ${teacher.name} (${teacher.id})`;
                renderAttendanceRows(studentsDatabase.slice(0, 8)); 
                renderPasswordRows(studentsDatabase.slice(0, 8));
            } else {
                alert("Incorrect Teacher ID or Password!\n\nTry these exact test profiles:\nID: TCH01  | Passcode: teachpass01\nID: TCH10  | Passcode: teachpass10");
            }
        } else if (role === 'student') {
            let student = studentsDatabase.find(s => s.id === idInput);
            if (student && student.password === passwordInput) {
                loggedInUser = student;
                showActivePanel('studentPortal');
                document.getElementById('studentWelcomeTitle').innerText = `👨‍🎓 Welcome, ${student.name}`;
                renderStudentProfile();
            } else {
                alert("Incorrect Student Username ID or Password Key!\n\nTry this exact test profile:\nID: STU1001 | Passcode: studpass1001");
            }
        }
    }

    function handleLogout() {
        loggedInUser = null;
        document.getElementById('loginId').value = "";
        document.getElementById('loginPassword').value = "";
        showActivePanel('loginPanel');
    }

    function showActivePanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        const targetPanel = document.getElementById(id);
        if(targetPanel) targetPanel.classList.add('active');
    }

    function switchTeacherTab(tabName, event) {
        document.querySelectorAll('.teacher-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        
        if (tabName === 'attendance') document.getElementById('tabAttendance').style.display = 'block';
        if (tabName === 'passwords') document.getElementById('tabPasswords').style.display = 'block';
        if (tabName === 'notices') document.getElementById('tabNotices').style.display = 'block';
        
        if(event && event.target) event.target.classList.add('active-tab');
    }

    function searchStudentAttendance() {
        const query = document.getElementById('attSearch').value.toLowerCase().trim();
        if (query === "") { renderAttendanceRows(studentsDatabase.slice(0, 8)); return; }
        
        let matches = studentsDatabase.filter(s => s.id.toLowerCase().includes(query) || s.name.toLowerCase().includes(query));
        renderAttendanceRows(matches.slice(0, 10));
    }

    function renderAttendanceRows(dataset) {
        const body = document.getElementById('attendanceTableBody');
        if(!body) return;
        body.innerHTML = dataset.length === 0 ? `<tr><td colspan="5" style="text-align:center;">No student profiles match search terms.</td></tr>` : "";
        
        dataset.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${s.id}</strong></td>
                <td>${s.name}</td>
                <td>${s.classBatch}</td>
                <td><span style="color:${s.status==='Present'?'green':'red'}; font-weight:bold;">${s.status}</span></td>
                <td>
                    <button class="btn-success" style="padding:4px 8px; font-size:12px; width:auto;" onclick="setAttendanceStatus('${s.id}', 'Present')">Present</button>
                    <button class="btn-danger" style="padding:4px 8px; font-size:12px; width:auto;" onclick="setAttendanceStatus('${s.id}', 'Absent')">Absent</button>
                </td>`;
            body.appendChild(tr);
        });
    }

    function setAttendanceStatus(studentId, newStatus) {
        let student = studentsDatabase.find(s => s.id === studentId);
        if (student) {
            student.status = newStatus;
            searchStudentAttendance();
        }
    }

    function searchStudentPasswords() {
        const query = document.getElementById('passSearch').value.toLowerCase().trim();
        if (query === "") { renderPasswordRows(studentsDatabase.slice(0, 8)); return; }
        
        let matches = studentsDatabase.filter(s => s.id.toLowerCase().includes(query) || s.name.toLowerCase().includes(query));
        renderPasswordRows(matches.slice(0, 10));
    }

    function renderPasswordRows(dataset) {
        const body = document.getElementById('passwordTableBody');
        if(!body) return;
        body.innerHTML = "";
        dataset.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td><input type="text" id="passInput-${s.id}" value="${s.password}" style="padding:5px; width:120px;"></td>
                <td><button class="btn-primary" style="padding:5px 10px; font-size:12px; width:auto;" onclick="changeStudentPassword('${s.id}')">Save</button></td>`;
            body.appendChild(tr);
        });
    }

    function changeStudentPassword(studentId) {
        const val = document.getElementById(`passInput-${studentId}`).value.trim();
        let student = studentsDatabase.find(s => s.id === studentId);
        if (student && val !== "") {
            student.password = val;
            alert(`Success! Security passcode for ${student.name} updated to: ${val}`);
            searchStudentPasswords();
        }
    }

    function createNewNotice() {
        const title = document.getElementById('noticeTitle').value.trim();
        const content = document.getElementById('noticeContent').value.trim();
        if (title === "" || content === "") { alert("Please complete notice fields!"); return; }
        
        schoolNotices.unshift({ title: "📢 " + title, content: content });
        document.getElementById('noticeTitle').value = "";
        document.getElementById('noticeContent').value = "";
        alert("Campus Announcement published to student portal dashboards successfully!");
    }

    function renderStudentProfile() {
        if (loggedInUser) {
            document.getElementById('profName').innerText = loggedInUser.name;
            document.getElementById('profId').innerText = loggedInUser.id;
            document.getElementById('profClass').innerText = loggedInUser.classBatch;
            document.getElementById('profStatus').innerText = loggedInUser.status;

            const p = document.getElementById('studentNoticePanel');
            if(!p) return;
            p.innerHTML = "";
            schoolNotices.forEach(n => {
                p.innerHTML += `<div class="notice-box"><strong>${n.title}</strong><p style="margin:5px 0 0 0; font-size:14px; color:#475569;">${n.content}</p></div>`;
            });
        }
    }
</script>
